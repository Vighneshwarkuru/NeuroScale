dataset:
  name: cifar10
  num_classes: 10
  image_size: 32
  data_dir: ./data

model:
  ann: resnet20
  batch_size: 128
  epochs: 100
  lr: 0.1
  weight_decay: 1.0e-4
  momentum: 0.9
  lr_schedule: cosine

conversion:
  method: threshold_balancing
  calibration_samples: 1024
  percentile: 99.9

snn:
  timesteps: [1, 2, 4, 8, 16, 32, 64]
  max_timestep: 64
  exit_points: [4, 8, 16, 32, 64]

predictor:
  hidden_dims: [64, 128, 64]
  lr: 1.0e-3
  epochs: 30
  batch_size: 256

scaling_law:
  target_accuracy: 0.95
  min_timestep: 2
  max_timestep: 64

inference:
  confidence_threshold: 0.9
  energy_weight: 0.5
