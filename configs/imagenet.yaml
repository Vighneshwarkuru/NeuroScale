dataset:
  name: imagenet
  num_classes: 1000
  image_size: 224
  data_dir: ./data/imagenet

model:
  ann: resnet34
  batch_size: 64
  epochs: 60
  lr: 0.1
  weight_decay: 1.0e-4
  momentum: 0.9
  lr_schedule: step
  lr_step_size: 20
  lr_gamma: 0.1

conversion:
  method: threshold_balancing
  calibration_samples: 1024
  percentile: 99.9

snn:
  timesteps: [1, 2, 4, 8, 16, 32, 64]
  max_timestep: 64
  exit_points: [4, 8, 16, 32, 64]

predictor:
  hidden_dims: [256, 512, 256]
  lr: 1.0e-3
  epochs: 20
  batch_size: 128

scaling_law:
  target_accuracy: 0.85
  min_timestep: 2
  max_timestep: 64

inference:
  confidence_threshold: 0.8
  energy_weight: 0.5
